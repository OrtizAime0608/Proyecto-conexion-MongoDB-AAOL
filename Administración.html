<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAFIDENT - Proyecto Dentista AAOL </title>

	<style>

	span{
	   color:#004d00;
	}

    	padding: 30px;

	input[type="submit"]:hover {

	a {

    	text-align: center;

	footer {

	}

	button{

	font-size:20px;
	width:auto;
