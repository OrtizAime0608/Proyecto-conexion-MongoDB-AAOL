<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAFIDENT - Proyecto Dentista AAOL </title>
	<style>

	span{
	   color:#DB7093;
	}

	body {
    	background: #fff5f6;
    	font-family: sans-serif;
    	padding: 30px;
    	max-width: 500px;
    	margin: 0 auto;
	}

	input[type="text"], input[type="date"] ,input[type="number"]{
   	width: 100%;	padding: 8px;	
	margin: 6px 0 16px 0;	
	border: 1px solid #ff8fa3;
    	border-radius: 6px;
    	box-sizing: border-box;
	}


	input[type="submit"] {
    	background: #ff4d6d;
    	color: white;
    	border: none;
    	padding: 12px;
    	border-radius: 6px;
    	width: 100%;
    	cursor: pointer;
    	font-weight: bold;
	}

	input[type="submit"]:hover {
    	background: #ff2a4b;
	}


	a {
    	display: block;
    	text-align: center;
    	margin-top: 15px;
    	color: #777;
    	text-decoration: none;
	}

	footer {
        color: #DB7093;
        padding: 25px;
        text-align: center;
	width:100%;
	margin-top:25px;
        }

	
        .logo {
            width: 100px;
            height: auto;
            margin-right: 30px; 
        }

	.encabezado {
    	display: flex;         
    	align-items: center;   
    	justify-content: center; 
    	gap: 15px;             
    	margin-bottom: 20px;  
	}
	button{
	font-family:Times New Roman;
	font-size:20px;
	width:auto;
	height:50px;
	background-color:#FFF0F5;
	}

	</style>
</head>
<body>

<header>
    <div class="encabezado">
    <img src="Zafident.png" alt="Zafident" class="logo">
    <span style="font-size: 90px; font-weight: bold;">PACIENTES</span>
    </div>

<main>
    <div class="form-container">
        <form action="altas.html" method="POST">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" name="nombre" placeholder="Ej: Aime Ortiz" required>
            </div>
           
            <div class="form-group">
                <label>Nacimiento:</label>
                <input type="date" name="nacimiento" required>
            </div>
           
            <div class="form-group">
                <label>Contacto:</label>
                <input type="number" name="contacto" placeholder="Ej: 656 111 2233" required>
            </div>
           
            <div class="form-group">
                <label>Contacto Emergencia:</label>
                <input type="number" name="emergencia" placeholder="Ej: Ana Rios 656 734 3344" required>
            </div>
           
            <div class="form-group">
                <label>Dirección:</label>
                <input type="text" name="dirección" placeholder="Ej: C.Brasil #5256" required>
            </div>
       
            <div class="form-group">
                <label>Tipo De Sangre:</label>
                <input type="text" name="sangre" placeholder="Ej: A+" required>
            </div>

            <div class="form-group">
                <label>Alergias:</label>
                <input type="text" name="alergias" placeholder="Ej:Latex " required>
            </div>

            <div class="form-group">
                <label>Enfermedades cronicas:</label>
                <input type="text" name="enf.cronicas" placeholder="Ej: Diabetes Tipo 1" required>
            </div>

            <div class="form-group">
                <label>Medicamentos Actuales:</label>
                <input type="text" name="medicamentos" placeholder="Ej: Insulina" required>
            </div>

            <div class="form-group">
                <label>Antecedentes Familiares:</label>
                <input type="text" name="antecedentes" placeholder="Ej: Asma " required>
            </div>

            <div class="form-group">
                <label>Odontograma:</label>
                <input type="text" name="odontograma" placeholder="Ej: Caries 11 " required>
            </div>

            <div class="form-group">
                <label>Motivo de Consulta:</label>
                <input type="text" name="consulta" placeholder="Ej: Limpieza" required>
            </div>

            <div class="form-group">
                <label>Diagnostico:</label>
                <input type="Text" name="diagnostico" placeholder="Ej: Caries" required>
            </div>

            <div class="form-group">
                <label>Tratamiento a realizar:</label>
                <input type="text" name="tratamiento" placeholder="Ej: Resina" required>
            </div>

            <div class="form-group">
                <label>Ultima Visita:</label>
                <input type="date" name="visita" placeholder="Ej: 12/06/26" required>
            </div>

 
            <center><button type="submit" class="btn-submit">Dar de alta al Paciente</button></center>
        </form>
    </div>

    <a href="index.html" class="btn-back"> Volver al Inicio</a>
</main>

<footer>
        <p>Nombre: Ortiz Lugo Aime Alexandra | No. Control: 24308051280608</p>
        <p>Semestre: 4to | Grupo: I | Especialidad: Programación</p>
    </footer>

</body>
</html>
